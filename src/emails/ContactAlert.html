<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #040D14; color: #ffffff; padding: 20px; }
    .container { max-w: 600px; margin: 0 auto; background: #071B2A; padding: 30px; border-radius: 8px; border-left: 4px solid #00D1FF; }
    .header { font-size: 20px; font-weight: bold; color: #00D1FF; margin-bottom: 20px; }
    .field { margin-bottom: 15px; }
    .label { font-size: 12px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-size: 16px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">New Contact Submission</div>
    <div class="field">
      <div class="label">Name</div>
      <div class="value">{{name}}</div>
    </div>
    <div class="field">
      <div class="label">Email</div>
      <div class="value">{{email}}</div>
    </div>
    <div class="field">
      <div class="label">Phone</div>
      <div class="value">{{phone}}</div>
    </div>
    <div class="field">
      <div class="label">Subject</div>
      <div class="value">{{subject}}</div>
    </div>
    <div class="field">
      <div class="label">Message</div>
      <div class="value">{{message}}</div>
    </div>
  </div>
</body>
</html>
